name = "aliasist-workers-api"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[observability]
enabled = true

# --- D1 bindings ---
# DataSist curated data-center intelligence database.
# Created once with `wrangler d1 create aliasist-datasist`; the generated
# database_id replaces the placeholder below. Migrations live in
# ./migrations/*.sql and apply with `pnpm d1:migrate`.
[[d1_databases]]
binding       = "DATA_DB"
database_name = "aliasist-datasist"
database_id   = "e3090220-b2a4-4973-a832-97f0235370e0"
migrations_dir = "migrations"

# --- Workers AI binding ---
[ai]
binding = "AI"

# CORS allowlist (comma-separated). Override per environment.
[vars]
ALLOWED_ORIGIN = "http://localhost:5173,https://aliasist.tech,https://www.aliasist.tech"
# Allow Cloudflare Pages preview frontends (*.pages.dev) for non-production workers only.
CORS_ALLOW_CF_PAGES = "true"
SPACE_ASK_RATE_WINDOW_MS = "60000"
SPACE_ASK_RATE_MAX = "24"
AI_OLLAMA_MODEL = "llama3.1:8b"
AI_GROQ_MODEL = "llama-3.3-70b-versatile"
OLLAMA_MODEL = "llama3.1:8b"
WORKERS_AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"
GEMINI_MODEL = "gemini-2.5-flash"
RAG_MAX_TOKENS = "900"
RAG_TEMPERATURE = "0.2"

# Secrets (set with `wrangler secret put`):
#   ADMIN_TOKEN       — required to hit privileged routes
#   OLLAMA_URL        — e.g. https://ollama.aliasist.tech (Cloudflare Tunnel to Azure)
#   OLLAMA_TOKEN      — shared bearer token for the Ollama gateway
#   GEMINI_API_KEY    — Gemini fallback provider
#   NASA_API_KEY      — optional api.nasa.gov key; DEMO_KEY is used locally when absent
#   GROQ_API_KEY      — legacy fallback AI provider (unused by SpaceSist RAG)
#   AI_OLLAMA_URL     — legacy Ollama URL name; OLLAMA_URL is preferred

# --- production environment ---
# Bound to api.aliasist.tech via a Worker Custom Domain (not a route).
# Custom domain was provisioned via the CF API and is managed outside
# wrangler to keep deploys idempotent without zone-level write scope.
[env.production]
name = "aliasist-workers-api"
# Public entry point is api.aliasist.tech (Worker Custom Domain) once the
# aliasist.tech zone redirect is cleared. Keep workers_dev = false in prod
# so we don't leak a parallel .workers.dev URL.
workers_dev = false

[[env.production.d1_databases]]
binding       = "DATA_DB"
database_name = "aliasist-datasist"
database_id   = "e3090220-b2a4-4973-a832-97f0235370e0"
migrations_dir = "migrations"

[env.production.ai]
binding = "AI"

[env.production.vars]
ALLOWED_ORIGIN = "https://aliasist.tech,https://www.aliasist.tech"
CORS_ALLOW_CF_PAGES = "false"
SPACE_ASK_RATE_WINDOW_MS = "60000"
SPACE_ASK_RATE_MAX = "24"
AI_OLLAMA_MODEL = "llama3.1:8b"
AI_GROQ_MODEL = "llama-3.3-70b-versatile"
OLLAMA_MODEL = "llama3.1:8b"
WORKERS_AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"
GEMINI_MODEL = "gemini-2.5-flash"
RAG_MAX_TOKENS = "900"
RAG_TEMPERATURE = "0.2"
